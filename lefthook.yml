rc: .lefthook-rc.sh

pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "**/*.{js,ts,jsx,tsx,json,jsonc}"
      run: pnpm exec biome check {staged_files}
    - name: typecheck
      run: pnpm typecheck

pre-push:
  jobs:
    - name: lint
      run: pnpm lint
    - name: typecheck
      run: pnpm typecheck
    - name: coverage
      run: pnpm test:coverage
    # e2e:smoke is CI-only — requires VITE_CONVEX_URL + VITE_CLERK_PUBLISHABLE_KEY
